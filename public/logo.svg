<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#b400ff" />
    </linearGradient>
    <linearGradient id="purpleCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b400ff" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
  </defs>
  
  <!-- Arcs -->
  <g fill="none" stroke-width="4" stroke-linecap="round">
    <path d="M 50 200 A 150 150 0 0 1 350 200" stroke="#3b1d70" />
    <path d="M 80 200 A 120 120 0 0 1 320 200" stroke="#4a2b90" />
    <path d="M 110 200 A 90 90 0 0 1 290 200" stroke="#2563eb" />
    <path d="M 140 200 A 60 60 0 0 1 260 200" stroke="#06b6d4" />
    <path d="M 170 200 A 30 30 0 0 1 230 200" stroke="#00e5ff" />
  </g>

  <!-- Waveform -->
  <g stroke="url(#cyanPurple)" stroke-width="6" stroke-linecap="round">
    <line x1="100" y1="200" x2="100" y2="210" />
    <line x1="115" y1="195" x2="115" y2="215" />
    <line x1="130" y1="185" x2="130" y2="225" />
    <line x1="145" y1="190" x2="145" y2="220" />
    <line x1="160" y1="170" x2="160" y2="240" />
    <line x1="175" y1="180" x2="175" y2="230" />
    <line x1="190" y1="160" x2="190" y2="250" />
    <line x1="205" y1="175" x2="205" y2="235" />
    <line x1="220" y1="165" x2="220" y2="245" />
    <line x1="235" y1="185" x2="235" y2="225" />
    <line x1="250" y1="175" x2="250" y2="235" />
    <line x1="265" y1="190" x2="265" y2="220" />
    <line x1="280" y1="195" x2="280" y2="215" />
    <line x1="295" y1="200" x2="295" y2="210" />
  </g>

  <!-- Play Button -->
  <circle cx="200" cy="180" r="16" fill="#0b0f19" stroke="#00e5ff" stroke-width="3" />
  <polygon points="195,172 208,180 195,188" fill="#00e5ff" />

  <!-- Text -->
  <text x="200" y="280" font-family="sans-serif" font-size="48" font-weight="bold" fill="url(#cyanPurple)" text-anchor="middle">ripple</text>
  <text x="200" y="310" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00e5ff" text-anchor="middle" letter-spacing="4">AUDIO EDITOR</text>
</svg>
